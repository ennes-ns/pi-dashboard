services:
  dashboard:
    build:
      context: ./dashboard
      target: dev
    container_name: pi-dashboard
    restart: always
    privileged: true
    network_mode: host
    tty: true
    stdin_open: true
    devices:
      - "/dev/tty1:/dev/tty1"
    volumes:
      - ./dashboard:/app
    # Clean execution: we map input/output directly to the physical TTY
    command: sh -c "sleep 5 && /app/tmp/main < /dev/tty1 > /dev/tty1"

  controller:
    build:
      context: ./controller
    container_name: streamdeck-daemon
    privileged: true
    restart: unless-stopped
    network_mode: host
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ./controller/app:/app
    environment:
      - DASHBOARD_WS_URL=ws://localhost:8080/ws
    depends_on:
      - dashboard
