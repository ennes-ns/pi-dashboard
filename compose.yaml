services:
  dashboard:
    build:
      context: ./dashboard
      target: dev
    container_name: pi-dashboard
    restart: always
    tty: true
    stdin_open: true
    volumes:
      - ./dashboard:/app
    ports:
      - "127.0.0.1:8080:8080" # Dashboard API / WebSocket
    networks:
      - pi-net
    security_opt:
      - no-new-privileges:true

  controller:
    build:
      context: ./controller
    container_name: streamdeck-daemon
    privileged: true
    restart: unless-stopped
    network_mode: host # Nodig voor USB HID en lokale API toegang
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ./controller/app:/app
    environment:
      - DASHBOARD_WS_URL=ws://localhost:8080/ws
    depends_on:
      - dashboard

networks:
  pi-net:
    driver: bridge
